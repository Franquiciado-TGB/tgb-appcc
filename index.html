<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<title>TGB APPCC</title>
<style>
:root{--verde:#C6E84D;--negro:#0A0A0A;--gris:#1F1F1F;--crema:#F5F1E8;--rojo:#FF3B3B;--ambar:#FFA726}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--negro);color:var(--crema);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;overscroll-behavior:none}
.app{max-width:600px;margin:0 auto;padding:20px 18px 60px;min-height:100vh}
.tag{display:inline-block;background:var(--verde);color:var(--negro);padding:6px 14px;font-weight:800;font-size:12px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:14px}
.titulo{font-size:38px;font-weight:900;line-height:.95;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:8px}
.subtitulo{color:#999;font-size:14px;margin-bottom:28px}
.btn{display:block;width:100%;padding:22px 18px;background:var(--verde);color:var(--negro);border:none;font-size:22px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;margin-bottom:14px;transition:transform .1s;font-family:inherit}
.btn:active{transform:scale(.97)}
.btn.secundario{background:var(--gris);color:var(--crema)}
.btn:disabled{opacity:.4;cursor:not-allowed}
input,textarea,select{width:100%;padding:16px 14px;background:var(--gris);color:var(--crema);border:2px solid #333;font-size:17px;font-family:inherit;border-radius:0;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--verde)}
label{display:block;margin:16px 0 6px;font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.lista-reg{list-style:none}
.item-reg{display:flex;align-items:center;gap:14px;padding:18px 14px;background:var(--gris);margin-bottom:8px;cursor:pointer;border-left:4px solid #333}
.item-reg:active{transform:scale(.99)}
.item-reg.hecho{border-left-color:var(--verde)}
.item-reg.bloq{opacity:.4;cursor:not-allowed}
.item-num{width:36px;height:36px;border-radius:50%;background:var(--verde);color:var(--negro);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.item-cuerpo{flex:1;min-width:0}
.item-cuerpo .titulo-reg{font-size:16px;font-weight:700;margin-bottom:2px}
.item-cuerpo .meta-reg{font-size:12px;color:#888}
.item-estado{font-size:22px;flex-shrink:0}
.equipo-fila{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #2a2a2a}
.equipo-fila .nombre{flex:1;font-size:15px;font-weight:600}
.equipo-fila .ref{font-size:11px;color:#888;display:block;margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.temp-wrap{display:flex;align-items:stretch;gap:0;width:140px;flex-shrink:0}
.temp-wrap .btn-signo{width:38px;background:var(--gris);color:var(--verde);border:2px solid #333;border-right:none;font-weight:900;font-size:16px;cursor:pointer;font-family:inherit;padding:0;letter-spacing:0}
.temp-wrap .btn-signo:active{background:#2a2a2a}
.temp-wrap input{flex:1;padding:14px 8px;text-align:center;font-weight:700;font-size:18px}
.equipo-fila input.alerta{border-color:var(--rojo);background:rgba(255,59,59,.15);color:var(--rojo)}
input.alerta{border-color:var(--rojo);background:rgba(255,59,59,.15);color:var(--rojo)}
.alerta-banner{background:var(--rojo);color:white;padding:14px;font-weight:700;margin:14px 0;font-size:14px}
.alerta-banner ul{margin:8px 0 0 18px;font-weight:500}
.volver{background:none;border:none;color:var(--verde);font-size:14px;font-weight:700;padding:0 0 18px;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;font-family:inherit}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--verde);color:var(--negro);padding:14px 22px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;font-size:14px;z-index:1000;animation:subir .3s}
.toast.error{background:var(--rojo);color:white}
@keyframes subir{from{transform:translate(-50%,50px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.barra-red{font-size:11px;text-align:center;padding:6px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;position:sticky;top:0;z-index:100}
.barra-red.online{background:var(--verde);color:var(--negro)}
.barra-red.offline{background:var(--rojo);color:white}
.barra-red.pendientes{background:var(--ambar);color:var(--negro)}
.hidden{display:none!important}
.seccion-titulo{font-size:11px;color:var(--verde);text-transform:uppercase;letter-spacing:.15em;font-weight:800;margin:24px 0 8px;padding-top:8px;border-top:1px solid #2a2a2a}
.seccion-titulo:first-child{border-top:none;padding-top:0}
.r07-medicion{border:1px solid #2a2a2a;padding:14px;margin-bottom:12px}
.r07-cab{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.r07-cab strong{color:var(--verde);font-size:12px;letter-spacing:.1em}
.btn-quitar{background:none;border:none;color:var(--rojo);font-weight:700;cursor:pointer;font-size:13px}
.check-fila{display:flex;align-items:center;gap:14px;padding:14px 10px;background:var(--gris);margin-bottom:6px;cursor:pointer;border-left:4px solid #333;font-size:15px;font-weight:600;text-transform:none;letter-spacing:0;color:var(--crema);margin-top:0}
.check-fila input[type=checkbox]{width:24px;height:24px;flex-shrink:0;accent-color:var(--verde);margin:0;padding:0}
.check-fila:has(input:checked){border-left-color:var(--verde);background:#2a2f1a}
.check-nombre{flex:1}
.r02-acciones{margin-top:14px}
.radio-opcion{display:flex;align-items:center;gap:8px;padding:14px;background:var(--gris);border:2px solid #333;flex:1;font-size:16px;font-weight:700;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--crema);margin:0}
.radio-opcion input[type=radio]{width:20px;height:20px;accent-color:var(--verde);margin:0}
.radio-opcion:has(input:checked){border-color:var(--verde);background:#2a2f1a}
.exito-tick{width:120px;height:120px;border-radius:50%;background:var(--verde);color:var(--negro);display:flex;align-items:center;justify-content:center;font-size:80px;font-weight:900;margin:30px auto 24px;line-height:1}
.exito-titulo{text-align:center;font-size:30px;font-weight:900;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:8px;color:var(--verde)}
.exito-sub{text-align:center;color:#aaa;font-size:14px;margin-bottom:24px}
.exito-card{background:var(--gris);padding:18px;margin-bottom:24px;border-left:4px solid var(--verde)}
.exito-card .codigo{font-size:11px;color:var(--verde);text-transform:uppercase;letter-spacing:.15em;font-weight:800;margin-bottom:6px}
.exito-card .nombre{font-size:18px;font-weight:800;margin-bottom:14px}
.exito-card .resumen{list-style:none;padding:0}
.exito-card .resumen li{padding:6px 0;font-size:14px;color:var(--crema);border-bottom:1px solid #2a2a2a}
.exito-card .resumen li:last-child{border:none}

.r06-equipo{background:var(--gris);padding:14px;margin-bottom:10px;border-left:4px solid #333}
.r06-equipo.r06-conforme{border-left-color:var(--verde)}
.r06-equipo.r06-noconforme{border-left-color:var(--rojo)}
.r06-cab{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.r06-nombre{flex:1;font-size:15px;font-weight:700}
.r06-nombre .ref{display:block;font-size:11px;color:#888;margin-top:2px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.r06-estado{font-size:22px;font-weight:900;width:34px;text-align:center}
.r06-estado.ok{color:var(--verde)}
.r06-estado.ko{color:var(--rojo)}
.r06-pos{display:flex;gap:8px;margin-bottom:8px}
.r06-pos-col{flex:1;display:flex;flex-direction:column;align-items:center}
.r06-pos-lbl{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px}
.r06-pos-col .temp-wrap{width:100%}
.r06-media{font-size:13px;color:#ccc;font-weight:600;text-align:right;padding-top:4px;border-top:1px solid #2a2a2a}
.r06-equipo.r06-noconforme .r06-media{color:var(--rojo)}
.r06-equipo.r06-conforme .r06-media{color:var(--verde)}


.r11-freidora{background:var(--gris);padding:14px;margin-bottom:10px;border-left:4px solid #333}
.r11-cab{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;color:var(--verde)}
.r11-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.r11-campo{display:flex;flex-direction:column}
.r11-campo label{margin:0 0 4px;font-size:11px}
.r11-campo select,.r11-campo input{padding:10px;font-size:15px}
.r11-campo .temp-wrap{width:100%}
.r11-lote-wrap{margin-top:8px}
.r11-aviso{font-size:13px;color:var(--ambar);margin-top:6px;font-weight:600}
.r11-aviso.activo{padding:6px 8px;background:rgba(255,167,38,.1);border-left:3px solid var(--ambar)}



.r01-cabecera{display:flex;flex-direction:column;gap:12px;margin-bottom:18px;padding:14px;background:#f7f9fb;border-radius:10px;border:1px solid #e6e9ed}
.r01-cabecera label{display:flex;flex-direction:column;font-weight:600;color:#1f2933;gap:6px;font-size:14px}
.r01-cabecera select,.r01-cabecera input{padding:10px;border:1px solid #cbd2d9;border-radius:8px;font-size:15px;font-family:inherit;background:#fff}
.r01-cabecera label.hidden{display:none}
.r01-alumnos{margin-top:14px}
.r01-alumnos-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.r01-alumnos-header h4{margin:0;color:#1f2933;font-size:15px}
.r01-fila{display:grid;grid-template-columns:30px 1fr 130px 32px;gap:8px;align-items:center;padding:8px;background:#fff;border:1px solid #e6e9ed;border-radius:8px;margin-bottom:8px}
.r01-fila .r01-num{font-weight:700;color:#52606d;text-align:center;font-size:14px}
.r01-fila input{padding:9px;border:1px solid #cbd2d9;border-radius:6px;font-size:14px;font-family:inherit}
.r01-fila .btn-quitar{background:#fff;border:1px solid #cbd2d9;color:#7b8794;border-radius:6px;width:30px;height:30px;font-size:18px;cursor:pointer;line-height:1;padding:0}
.r01-fila .btn-quitar:hover{background:#fee;border-color:#e74c3c;color:#e74c3c}
</style>
</head>
<body>
<div id="barra-red" class="barra-red online">Conectado</div>
<div class="app">
<section id="p1">
<div class="tag">TGB · APPCC</div>
<h1 class="titulo">¿Qué local?</h1>
<p class="subtitulo">Selecciona dónde estás trabajando hoy</p>
<button class="btn" data-local="Antiguo">Antiguo</button>
<button class="btn" data-local="Zurriola">Zurriola</button>
<button class="btn" data-local="Ballonti">Ballonti</button>
</section>
<section id="p2" class="hidden">
<button class="volver" data-volver="p1">← Volver</button>
<div class="tag">Local: <span id="p2-local"></span></div>
<h1 class="titulo">¿Quién eres?</h1>
<p class="subtitulo">Escribe tu nombre y apellido</p>
<label>Nombre del encargado</label>
<input id="inp-encargado" type="text" autocomplete="off" placeholder="Ej. Verónica García">
<button class="btn" id="btn-continuar" style="margin-top:24px">Continuar →</button>
</section>
<section id="p3" class="hidden">
<button class="volver" data-volver="p2">← Cambiar nombre</button>
<div class="tag" id="p3-tag"></div>
<h1 class="titulo">Registros de hoy</h1>
<p class="subtitulo" id="p3-fecha"></p>
<ul class="lista-reg" id="lista-reg"></ul>
</section>
<section id="p4" class="hidden">
<button class="volver" data-volver="p3">← Volver a la lista</button>
<div class="tag" id="p4-tag"></div>
<h1 class="titulo" id="p4-titulo"></h1>
<p class="subtitulo" id="p4-subtitulo"></p>
<div id="p4-formulario"></div>
<div id="p4-alerta" class="hidden"></div>
<button class="btn" id="btn-guardar" style="margin-top:28px">Guardar registro</button>
</section>
<section id="p5" class="hidden">
<div class="exito-tick">✓</div>
<h1 class="exito-titulo">Registro guardado</h1>
<p class="exito-sub" id="p5-hora"></p>
<div class="exito-card">
<div class="codigo" id="p5-codigo"></div>
<div class="nombre" id="p5-titulo"></div>
<ul class="resumen" id="p5-resumen"></ul>
</div>
<button class="btn" id="p5-btn-volver">← Volver a la lista</button>
</section>
</div>
<div id="toast" class="toast hidden"></div>
<script src="app.js?v=17"></script>
</body>
</html>
